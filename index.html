<!DOCTYPE html>  
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Special Love</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#e60808,#b86d6d);
    color:white;
}

/* 🌸 Rose Petals */
.petal{
    position:fixed;
    top:-10vh;
    font-size:24px;
    animation:petalFall linear infinite;
    z-index:0;
}
@keyframes petalFall{
    0%{ transform:translateY(-10vh) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0; }
}

/* 💗 Floating Hearts */
.float-heart{
    position:fixed;
    width:20px;
    height:20px;
    background:#ff4da6;
    transform:rotate(45deg);
    opacity:0;
    z-index:0;
    animation:floatUp linear infinite;
}
.float-heart:before,
.float-heart:after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:#ff4da6;
    border-radius:50%;
}
.float-heart:before{ top:-50%; left:0; }
.float-heart:after{ left:-50%; top:0; }

@keyframes floatUp{
    0%{ transform:translateY(100vh) translateX(0px) rotate(45deg); opacity:0; }
    20%{ opacity:0.8; }
    50%{ transform:translateY(50vh) translateX(25px) rotate(45deg); }
    100%{ transform:translateY(-10vh) translateX(-25px) rotate(45deg); opacity:0; }
}

/* ❤️ Firework */
.fire-heart{
    position:fixed;
    font-size:30px;
    animation:explode 1.5s ease-out forwards;
}
@keyframes explode{
    0%{ transform:scale(1); opacity:1; }
    100%{ transform:translateY(-200px) scale(2); opacity:0; }
}

/* BIG HEART LOGIN */
.big-heart{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-45deg);
    width:350px;
    height:350px;
    background:red;
}
.big-heart:before,
.big-heart:after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:red;
    border-radius:50%;
}
.big-heart:before{top:-175px;}
.big-heart:after{left:175px;}

.login-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:250px;
    font-size:15px;
    text-align:center;
}

/* Main Page */
#main{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:linear-gradient(135deg,#b30000,#ff99cc);
    font-size:10px;
    padding:20px;
    border-radius:25px;
    z-index:2;
}

.slideshow img{
    width:175px;
    height:200px;
    border-radius:20px;
    margin-top:20px;
}

#proposal{
    display:none;
    font-size:15px;
    margin-top:20px;
}

input{
    width:200px;
    padding:10px;
    margin:8px 0;
    border-radius:20px;
    border:none;
    text-align:center;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:white;
    color:red;
    font-weight:bold;
    cursor:pointer;
}

/* 🖤 FINAL BLACK SCREEN */
#finalScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    font-size:22px;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity 2s ease;
    z-index:9999;
}
#finalScreen.show{
    opacity:1;
    pointer-events:auto;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="big-heart" id="heartBox"></div>

<div class="login-content" id="loginContent">
    <h2>Enter Your Name ❤️</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
</div>

<div id="main">
    <h1 id="welcome"></h1>

    <div class="slideshow">
        <img id="slide" src="">
    </div>

    <div id="proposal">
        💖 R u Happy With Me? <br><br>
        <button onclick="yesAnswer()">YES 💖</button>
        <button id="noBtn" onmouseover="moveNo()">NO 😜</button>
    </div>
</div>

<!-- 🖤 FINAL SCREEN -->
<div id="finalScreen">
    💖 My Love 💖<br><br>
        You are my peace, my strength, my forever.<br><br>
        I’m waiting for the day I walk toward you as your bride 💍…<br>
        but I’ve been yours since the moment you chose me. 
</div>

<script>

/* 🌸 Petals */
function startPetals(){
    for(let i=0;i<30;i++){
        let petal=document.createElement("div");
        petal.className="petal";
        petal.innerHTML="🌸";
        petal.style.left=Math.random()*100+"vw";
        petal.style.animationDuration=(6+Math.random()*4)+"s";
        document.body.appendChild(petal);
    }
}
startPetals();

function removePetals(){
    document.querySelectorAll(".petal").forEach(p=>p.remove());
}

/* 💗 Floating Hearts */
function startPinkHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="float-heart";
        let size = 15 + Math.random()*20;
        h.style.width=size+"px";
        h.style.height=size+"px";
        h.style.left=Math.random()*100+"vw";
        h.style.animationDuration=(8+Math.random()*6)+"s";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),15000);
    },400);
}

/* ❤️ Firework */
function heartFirework(){
    for(let i=0;i<80;i++){
        let heart=document.createElement("div");
        heart.className="fire-heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        heart.style.top=Math.random()*100+"vh";
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),1500);
    }
}

/* LOGIN */
function login(){
    let pass=document.getElementById("password").value;
    let name=document.getElementById("name").value;

    if(pass==="reenagopi26"){
        heartFirework();
        setTimeout(()=>{
            removePetals();
            document.getElementById("heartBox").style.display="none";
            document.getElementById("loginContent").style.display="none";
            document.body.style.background="linear-gradient(135deg,#b30000,#ff99cc)";
            document.getElementById("main").style.display="block";
            document.getElementById("welcome").innerHTML="I Love You, "+name+" ❤️";
            document.getElementById("proposal").style.display="block";
            startPinkHearts();
            document.getElementById("bgMusic").play();
        },800);
    }else{
        alert("Wrong Password 💔");
    }
}

/* Slideshow */
let images=["Pic1.jpeg","Pic2.jpeg","Pic4.jpeg"];
let index=0;
setInterval(()=>{
    index=(index+1)%images.length;
    document.getElementById("slide").src=images[index];
},3000);

/* Move NO */
function moveNo(){
    let btn=document.getElementById("noBtn");
    btn.style.position="absolute";
    btn.style.left=Math.random()*80+"%";
    btn.style.top=Math.random()*80+"%";
}

/* YES */
function yesAnswer(){
    alert("YES! 💖");
    heartFirework();

    setTimeout(()=>{
        document.getElementById("finalScreen").classList.add("show");
    },1000);
}

</script>

</body>
</html>
